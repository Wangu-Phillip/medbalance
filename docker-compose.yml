services:
  db:
    image: postgres:16
    container_name: medbalance-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medbalance}
      POSTGRES_USER: ${POSTGRES_USER:-medbalance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medbalance}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
    container_name: medbalance-api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://medbalance:medbalance@db:5432/medbalance}
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      - db

  web:
    build:
      context: ./web
    container_name: medbalance-web
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
